<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre l'Équipe Technique - Écodim</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { color: #1a365d; text-align: center; margin-bottom: 5px; }
    p.subtitle { text-align: center; color: #718096; font-size: 0.9em; margin-bottom: 25px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #2d3748; font-weight: 600; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; }
    input:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.2); }
    button { width: 100%; padding: 12px; background-color: #3182ce; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
    button:hover { background-color: #2b6cb0; }
    .alert { padding: 10px; border-radius: 6px; text-align: center; margin-top: 15px; display: none; }
    .success { background-color: #c6f6d5; color: #22543d; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Écodim - CMVL</h2>
    <p class="subtitle">Inscription à L'équipe de communication & médias </p>

    <form id="techForm">
      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" required placeholder="Votre nom">
      </div>
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" required placeholder="Votre prénom">
      </div>
      <div class="form-group">
        <label for="age">Âge</label>
        <input type="number" id="age" min="10" max="99" required placeholder="Ex: 18">
      </div>
      <button type="submit">Envoyer ma candidature</button>
    </form>

    <div id="message" class="alert success">Candidature envoyée avec succès !</div>
  </div>

  <!-- Firebase Web SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ REMPLACEZ PAR VOTRE CONFIGURATION FIREBASE ICI
    const firebaseConfig = {
      apiKey: "AIzaSyCB-GK37JProHeWMjlCnq_NuSE6fw-hZus",
       authDomain: "site-media-ecodim.firebaseapp.com",
       projectId: "site-media-ecodim",
       storageBucket: "site-media-ecodim.firebasestorage.app",
       messagingSenderId: "205924153822",
       appId: "1:205924153822:web:11b98b9f42f4cd4624454f",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('techForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nom = document.getElementById('nom').value;
      const prenom = document.getElementById('prenom').value;
      const age = parseInt(document.getElementById('age').value);

      try {
        await addDoc(collection(db, "equipe_technique"), {
          nom: nom,
          prenom: prenom,
          age: age,
          dateInscription: serverTimestamp()
        });

        document.getElementById('techForm').reset();
        const msg = document.getElementById('message');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 4000);
      } catch (error) {
        alert("Erreur lors de l'envoi : " + error.message);
      }
    });
  </script>
</body>
</html>
